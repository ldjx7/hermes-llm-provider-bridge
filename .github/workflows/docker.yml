name: Docker

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ldjx7/hermes-bridge

jobs:
  check-main-tag:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.main.outputs.should_publish }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Docker tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check tag commit is on main
        id: main
        shell: bash
        run: |
          git fetch origin main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is reachable from main; Docker image will be published."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not reachable from main; Docker image publish is skipped."
          fi

  publish:
    needs: check-main-tag
    if: needs.check-main-tag.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.check-main-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.check-main-tag.outputs.tag }}

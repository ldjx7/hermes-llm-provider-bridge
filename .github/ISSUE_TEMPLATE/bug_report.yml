name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include credentials, tokens, or mounted profile data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node:
        Bridge version:
        Backend CLI:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets before posting.
      render: shell
